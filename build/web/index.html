<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gravity Swirl - A physics-based puzzle game with swirling gravity mechanics. Guide particles through cosmic gravity wells!">
  <meta name="keywords" content="Flutter, Game, Physics, Gravity, Puzzle, Web Game">
  <meta name="author" content="Govind Tank">
  <meta name="theme-color" content="#6366F1">
  
  <!-- Open Graph / Social -->
  <meta property="og:title" content="Gravity Swirl - Physics Puzzle Game">
  <meta property="og:description" content="Master the physics of the cosmos in this captivating puzzle game!">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gravity Swirl">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>Gravity Swirl - Physics Puzzle Game</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0F0F23;
      overflow: hidden;
    }
    
    /* Loading screen */
    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1A1A2E 0%, #0F0F23 100%);
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    
    .loading-logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      animation: pulse 2s infinite;
    }
    
    .loading-text {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(99, 102, 241, 0.3);
      border-top-color: #6366F1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(99, 102, 241, 0); }
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loaded .loading-container {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading">
    <div class="loading-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="white"/>
      </svg>
    </div>
    <div class="loading-text">Loading Gravity Swirl...</div>
    <div class="loading-spinner"></div>
  </div>
  
  <script>
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').style.opacity = '0';
      setTimeout(function() {
        document.getElementById('loading').style.display = 'none';
      }, 500);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
